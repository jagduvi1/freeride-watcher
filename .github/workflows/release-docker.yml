
name: Release Docker Image

on:
  release:
    types: [published]  # Triggers when you publish a GitHub Release (e.g., v0.0.1)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Needed to push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optional: derive tags from the release tag (e.g., v0.0.1) and also add latest
      - name: Extract release tag
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"    # e.g., v0.0.1
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch optional)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile           # adjust if your Dockerfile is elsewhere
          platforms: linux/amd64       # add linux/arm64 if you need it
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.version=${{ steps.vars.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
